    </button>
  </nav>

  <!-- Menú móvil overlay -->
  <div class="nav__mobile-menu" role="dialog" aria-modal="true" aria-label="Menú de navegación">
    <button class="nav__mobile-close" aria-label="Cerrar menú">&times;</button>
    <a href="weddings.html">Weddings</a>
    <a href="inquires.html">Inquires</a>
  </div>

  <!-- ============================================================
       PORTAFOLIO DE BODAS
  ============================================================ -->
  <main class="weddings-main" id="weddingsMain">
    <!-- Las bodas se cargan dinámicamente desde /api/weddings -->
  </main>

  <!-- ============================================================
       FOOTER
  ============================================================ -->
  <footer class="footer" aria-label="Pie de página">
    <div class="footer__grid">

      <div class="footer__logo-wrap">
        <a href="index.html" class="footer__logo">
          Punto <span class="amp">&amp;</span> Toma
        </a>
      </div>

      <nav class="footer__nav" aria-label="Navegación del footer">
        <ul class="footer__nav-primary">
          <li><a href="weddings.html">Weddings</a></li>
          <li><a href="inquires.html">Inquires</a></li>
        </ul>
      </nav>

      <div class="footer__contact">
        <p class="footer__contact-title">Contact Us</p>
        <ul class="footer__contact-list">
          <li>WhatsApp: <a href="https://wa.me/528182873655" target="_blank" rel="noopener">818 287 3655</a></li>
          <li>Email: <a href="mailto:hola@puntoytoma.mx">hola@puntoytoma.mx</a></li>
          <li>Studio: Baleones 118, Cd. Satélite,<br>64960, MTY, NL</li>
        </ul>
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer"
           class="footer__instagram" aria-label="Instagram de Punto y Toma">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="4.5"/>
            <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
          </svg>
          Instagram

    </div>

    <div class="footer__bottom">
      <p class="footer__copy">
        &copy; <span id="footer-year"></span> Punto &amp; Toma. Todos los derechos reservados.
      </p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    /* ── Cargar bodas desde la API ── */
    (async () => {
      const main = document.getElementById('weddingsMain');
      try {
        const weddings = await fetch('/api/weddings').then(r => r.json());

        if (!weddings.length) {
          main.innerHTML = '<p style="text-align:center;padding:80px 20px;font-family:\'Montserrat\',sans-serif;color:#6B6B60;">Próximamente.</p>';
          return;
        }

        main.innerHTML = weddings.map(w => `
          <article class="wedding-entry">
            <h2 class="wedding-entry__name">${escHtml(w.names)}</h2>
            <div class="wedding-entry__image" role="img" aria-label="Fotografía de la boda de ${escHtml(w.names)}">
              ${w.image ? `<img src="${w.image}" alt="Boda de ${escHtml(w.names)}" />` : ''}
            </div>
          </article>
        `).join('');
      } catch (e) {
        main.innerHTML = '';
      }

      function escHtml(str) {
        return String(str || '')
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }
    })();
  </script>

</body>
