<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Punto &amp; Toma</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="login-body">

  <div class="login-card">
    <h1 class="login-logo">Punto <span class="amp">&amp;</span> Toma</h1>
    <p class="login-sub">Panel de administración</p>

    <form class="login-form" id="loginForm">
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password" autofocus />
      </div>
      <p class="login-error" id="loginError"></p>
      <button type="submit" class="btn-primary">Entrar</button>
    </form>
  </div>

  <script>
    // Si ya está logueado, redirigir al dashboard
    fetch('/api/auth')
      .then(r => r.json())
      .then(d => { if (d.isAdmin) window.location.href = '/admin/dashboard.html'; });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const err = document.getElementById('loginError');
      err.textContent = '';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        if (res.ok) {
          window.location.href = '/admin/dashboard.html';
        } else {
          err.textContent = 'Contraseña incorrecta.';
        }
      } catch {
        err.textContent = 'Error de conexión.';
      }
    });
  </script>
</body>
</html>
